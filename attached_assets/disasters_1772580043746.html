<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Disaster Record — Your Earth</title>
<style>
:root {
  --bg:       #050a14;
  --panel:    rgba(6,13,26,0.94);
  --border:   #1a2f45;
  --dim:      #3a5a7a;
  --mid:      #6a8fa8;
  --text:     #a0c4d8;
  --accent:   #7ab3cc;

  /* disaster type colours */
  --heat:      #ff6b35;
  --wildfire:  #ff9500;
  --flood:     #38bdf8;
  --hurricane: #a78bfa;
  --storm:     #60a5fa;
  --drought:   #d4a853;
  --other:     #94a3b8;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Courier New', monospace;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

/* ── CANVAS ── */
#canvas-3d { display:block; position:absolute; inset:0; }
#canvas-2d { display:block; position:absolute; inset:0; cursor:grab; }
#canvas-2d:active { cursor:grabbing; }
.view-hidden { opacity:0; pointer-events:none; }

/* ── HEADER ── */
#header {
  position:fixed; top:0; left:0; right:220px;
  padding:18px 22px 0; pointer-events:none; z-index:10;
}
#header h1 {
  font-size:11px; letter-spacing:.35em; text-transform:uppercase;
  color:var(--accent); font-weight:400; font-family:'Courier New', monospace;
}
#header p {
  font-size:9px; letter-spacing:.18em; color:var(--dim); margin-top:3px;
}

/* ── VIEW TOGGLE ── */
#view-btn {
  position:fixed; top:18px; right:236px;
  padding:7px 16px; border:1px solid var(--border);
  font-family:'Courier New', monospace; font-size:9px;
  letter-spacing:.2em; color:var(--mid); background:var(--panel);
  cursor:pointer; text-transform:uppercase; transition:all .2s;
  backdrop-filter:blur(8px); z-index:20;
}
#view-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── ROTATE / 2D CONTROLS ── */
#rotate-btn {
  position:fixed; bottom:18px; left:22px;
  padding:7px 14px; border:1px solid var(--border);
  font-family:'Courier New', monospace; font-size:9px;
  letter-spacing:.2em; color:var(--mid); background:var(--panel);
  cursor:pointer; text-transform:uppercase; transition:all .2s;
  backdrop-filter:blur(8px); display:flex; align-items:center; gap:7px; z-index:10;
}
#rotate-btn:hover { border-color:var(--accent); color:var(--accent); }
#rotate-btn.active { border-color:#4a9a7a; color:#4a9a7a; }
#rotate-btn .dot { width:6px; height:6px; border-radius:50%; background:currentColor; }

#map-controls {
  position:fixed; bottom:18px; left:22px;
  display:none; gap:6px; z-index:10;
}
#map-controls.visible { display:flex; }
.map-btn {
  width:28px; height:28px; border:1px solid var(--border);
  background:var(--panel); color:var(--mid); font-size:14px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:all .2s; backdrop-filter:blur(8px);
  font-family:'Courier New', monospace;
}
.map-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── HINT ── */
#hint {
  position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
  font-size:9px; color:var(--dim); letter-spacing:.15em; pointer-events:none;
}

/* ── SIDE PANEL ── */
#panel {
  position:fixed; top:0; right:0; bottom:0; width:220px;
  background:var(--panel); border-left:1px solid var(--border);
  backdrop-filter:blur(12px); display:flex; flex-direction:column; z-index:10;
}
#panel-head {
  padding:18px 16px 12px; border-bottom:1px solid var(--border);
  flex-shrink:0; display:flex; align-items:center; justify-content:space-between;
}
#panel-head h2 {
  font-size:9px; letter-spacing:.28em; color:var(--dim);
  text-transform:uppercase; font-weight:400;
}
#toggle-all {
  font-size:8px; letter-spacing:.12em; color:var(--dim);
  background:none; border:1px solid var(--border);
  font-family:'Courier New', monospace; padding:3px 8px;
  cursor:pointer; transition:all .2s; text-transform:uppercase;
}
#toggle-all:hover { border-color:var(--accent); color:var(--accent); }

#panel-scroll {
  overflow-y:auto; flex:1; padding:4px 0 16px;
}
#panel-scroll::-webkit-scrollbar { width:3px; }
#panel-scroll::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

/* ── PANEL SECTIONS ── */
.sec-wrap { border-top:1px solid var(--border); margin-top:4px; }
.sec-wrap:first-child { border-top:none; margin-top:0; }
.sec { display:flex; align-items:center; justify-content:space-between; padding:10px 16px 5px; cursor:pointer; user-select:none; }
.sec-label { font-size:8px; letter-spacing:.22em; color:var(--dim); text-transform:uppercase; }
.sec-tog { font-size:9px; color:var(--dim); transition:color .15s; padding:0 2px; }
.sec-wrap:hover .sec-tog { color:var(--accent); }
.sec-wrap.collapsed .row { display:none; }
.sec-wrap.sec-off .sec-label { opacity:.4; }

.row {
  display:flex; align-items:center; gap:8px; padding:5px 16px;
  cursor:pointer; transition:background .15s;
}
.row:hover { background:rgba(255,255,255,.025); }
.row.off .sw  { opacity:.22; }
.row.off .rl  { color:var(--dim); }
.row.off .rc  { opacity:.25; }

.sw { flex-shrink:0; }
.sw.dot  { width:8px; height:8px; border-radius:50%; }
.sw.line { width:16px; height:3px; border-radius:1.5px; }
.rl { font-size:10px; color:var(--mid); letter-spacing:.03em; flex:1; line-height:1.3; }
.rc { font-size:9px; color:var(--dim); flex-shrink:0; }

.tog {
  flex-shrink:0; width:24px; height:12px; background:var(--border);
  border-radius:6px; position:relative; transition:background .2s;
}
.tog::after {
  content:''; position:absolute; top:2px; left:2px;
  width:8px; height:8px; border-radius:50%; background:var(--dim);
  transition:transform .2s, background .2s;
}
.row:not(.off) .tog { background:rgba(122,179,204,.3); }
.row:not(.off) .tog::after { transform:translateX(12px); background:var(--accent); }

/* ── DISASTER CARD (hover popup) ── */
#card {
  position:fixed; pointer-events:none;
  background:rgba(4,9,20,.97);
  border:1px solid var(--border);
  width:220px;
  display:none;
  z-index:60;
  backdrop-filter:blur(12px);
  transition: opacity .15s;
}
#card .card-img {
  width:100%; height:130px;
  object-fit:cover; display:block;
  background:var(--border);
  position:relative;
}
#card .card-img-placeholder {
  width:100%; height:130px;
  background:linear-gradient(135deg,#0a1828,#0f2035);
  display:flex; align-items:center; justify-content:center;
  font-size:28px; color:var(--dim);
}
#card .card-body { padding:10px 12px 12px; }
#card .card-type {
  font-size:7.5px; letter-spacing:.22em; text-transform:uppercase;
  margin-bottom:5px; display:flex; align-items:center; gap:5px;
}
#card .card-type-dot {
  width:5px; height:5px; border-radius:50%; flex-shrink:0;
}
#card .card-location {
  font-size:11px; color:#d8eef8; margin-bottom:4px;
  font-family:'Courier New',monospace; font-weight:700; letter-spacing:.04em;
  line-height:1.3;
}
#card .card-date {
  font-size:9px; color:var(--dim); letter-spacing:.1em;
}
#card .card-img-wrap { position:relative; overflow:hidden; }
#card .card-loading {
  position:absolute; inset:0; display:flex; align-items:center;
  justify-content:center; background:#050a14; font-size:8px;
  letter-spacing:.2em; color:var(--dim);
}

/* ── LOADING SCREEN ── */
#loading {
  position:fixed; inset:0; background:var(--bg);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:10px; z-index:100;
}
#loading p {
  font-size:9px; letter-spacing:.3em; color:var(--dim); text-transform:uppercase;
}
.bar-wrap { width:160px; height:2px; background:var(--border); border-radius:1px; }
.bar { height:100%; width:0%; background:var(--accent); border-radius:1px; transition:width .3s; }

/* ── STAT BAR ── */
#stat-bar {
  position:fixed; top:52px; left:22px;
  display:flex; gap:14px; pointer-events:none; z-index:10;
}
.stat-chip {
  font-size:8px; letter-spacing:.15em; color:var(--dim);
  border:1px solid var(--border); padding:3px 8px;
  background:rgba(6,13,26,.8); backdrop-filter:blur(6px);
}
.stat-chip span { color:var(--accent); }
</style>
</head>
<body>

<!-- Canvases -->
<canvas id="canvas-3d"></canvas>
<canvas id="canvas-2d" class="view-hidden"></canvas>

<!-- Header -->
<div id="header">
  <h1>Global Disaster Record</h1>
  <p><span id="ev-count"></span> Events · Heat · Wildfire · Flood · Drought · Pollution · Sea Level Rise · Pests · More</p>
</div>

<!-- Stat bar -->
<div id="stat-bar">
  <div class="stat-chip">EVENTS <span id="stat-total">178</span></div>
  <div class="stat-chip">VISIBLE <span id="stat-visible">178</span></div>
</div>

<!-- View toggle -->
<button id="view-btn">▦ FLAT MAP</button>

<!-- 3D controls -->
<button id="rotate-btn"><span class="dot"></span><span id="rotate-label">AUTO ROTATE</span></button>

<!-- 2D controls -->
<div id="map-controls">

  <button class="map-btn" id="zoom-out">−</button>
  <button class="map-btn" id="reset-v">⌂</button>
</div>

<div id="hint">DRAG TO ROTATE &nbsp;·&nbsp; SCROLL TO ZOOM</div>

<!-- Side Panel -->
<div id="panel">
  <div id="panel-head"><h2>Filter</h2><button id="toggle-all">All Off</button></div>
  <div id="panel-scroll"></div>
</div>

<!-- Disaster card popup -->
<div id="card">
  <div class="card-img-wrap">

  </div>
  <div class="card-body">

    <div class="card-date" id="card-date"></div>

</div>

<!-- Loading screen -->
<div id="loading">
  <p id="load-msg">Initialising</p>
  <div class="bar-wrap"><div class="bar" id="load-bar"></div></div>
</div>

const gl = canvas3.getContext('webgl', {antialias:true, alpha:false});
gl.getExtension('OES_element_index_uint');

function resize3() {
  canvas3.width  = window.innerWidth;
  canvas3.height = window.innerHeight;
  gl.viewport(0,0,canvas3.width,canvas3.height);
}
resize3();
window.addEventListener('resize', () => { resize3(); resize2(); if(is3D) draw3(); else draw2(); });

function mkShader(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);return sh;}
function mkProg(vs,fs){const p=gl.createProgram();gl.attachShader(p,mkShader(gl.VERTEX_SHADER,vs));gl.attachShader(p,mkShader(gl.FRAGMENT_SHADER,fs));gl.linkProgram(p);return p;}
function mkVBO(d){const b=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,b);gl.bufferData(gl.ARRAY_BUFFER,d,gl.STATIC_DRAW);return b;}
function mkIBO(d){const b=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,b);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint32Array(d),gl.STATIC_DRAW);return b;}

const globeProg = mkProg(
  `attribute vec3 aPos;uniform mat4 uMVP;varying vec3 vN;
   void main(){vN=aPos;gl_Position=uMVP*vec4(aPos,1.);}`,
  `precision mediump float;varying vec3 vN;
   void main(){
     vec3 n=normalize(vN);
     float d=max(dot(n,normalize(vec3(1.2,1.6,.8))),0.);
     vec3 c=vec3(.018,.068,.148)+d*vec3(.025,.07,.14);
     float gLa=pow(abs(cos(asin(clamp(n.y,-1.,1.))*6.)),26.);
     float gLo=pow(abs(cos(atan(n.z,n.x)*6.)),26.);
     c=mix(c,c+vec3(.025,.05,.09),max(gLa,gLo)*.55);
     gl_FragColor=vec4(c,1.);}`
);
const ptProg = mkProg(
  `attribute vec3 aPos;attribute vec3 aCol;attribute float aSz;
   uniform mat4 uMVP;uniform vec3 uEye;
   varying vec3 vCol;varying float vVis;
   void main(){
     vCol=aCol;vVis=dot(normalize(aPos),normalize(uEye));
     gl_Position=uMVP*vec4(aPos,1.);
     gl_PointSize=vVis>.05?aSz:0.;}`,
  `precision mediump float;varying vec3 vCol;varying float vVis;
   void main(){
     if(vVis<.05)discard;
     vec2 c=gl_PointCoord-.5;if(dot(c,c)>.25)discard;
     // Soft ring: bright centre, glowing rim
     float r=sqrt(dot(c,c));
     float core=1.-smoothstep(.0,.12,r);
     float ring=smoothstep(.12,.22,r)*(1.-smoothstep(.22,.25,r));
     float a=(core*.9+ring*.5)*min(vVis*3.,1.);
     gl_FragColor=vec4(vCol,a);}`
);
const lineProg = mkProg(
  `attribute vec3 aPos;uniform mat4 uMVP;uniform vec3 uEye;uniform vec3 uCol;
   varying vec3 vC;varying float vF;
   void main(){vC=uCol;vF=dot(normalize(aPos),normalize(uEye));gl_Position=uMVP*vec4(aPos,1.);}`,
  `precision mediump float;varying vec3 vC;varying float vF;uniform float uA;
   void main(){if(vF<.06)discard;gl_FragColor=vec4(vC,smoothstep(.06,.28,vF)*uA);}`
);

// Math helpers
const m4=()=>new Float32Array(16);
function mul4(o,a,b){for(let i=0;i<4;i++)for(let j=0;j<4;j++){o[j*4+i]=0;for(let k=0;k<4;k++)o[j*4+i]+=a[k*4+i]*b[j*4+k];}return o;}
function persp(m,fov,asp,n,f){m.fill(0);const t=1/Math.tan(fov/2);m[0]=t/asp;m[5]=t;m[10]=(f+n)/(n-f);m[11]=-1;m[14]=2*f*n/(n-f);return m;}
function lookAt(m,e,c,u){const z=n3(sub3(e,c)),x=n3(cross3(u,z)),y=cross3(z,x);m[0]=x[0];m[4]=x[1];m[8]=x[2];m[12]=-dot3(x,e);m[1]=y[0];m[5]=y[1];m[9]=y[2];m[13]=-dot3(y,e);m[2]=z[0];m[6]=z[1];m[10]=z[2];m[14]=-dot3(z,e);m[3]=m[7]=m[11]=0;m[15]=1;return m;}
const sub3=(a,b)=>[a[0]-b[0],a[1]-b[1],a[2]-b[2]];
const dot3=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const cross3=(a,b)=>[a[1]*b[2]-a[2]*b[1],a[2]*b[0]-a[0]*b[2],a[0]*b[1]-a[1]*b[0]];
const n3=a=>{const l=Math.sqrt(dot3(a,a));return[a[0]/l,a[1]/l,a[2]/l];};
function ll2xyz(lat,lon,r){const ph=(90-lat)*Math.PI/180,th=(lon+180)*Math.PI/180;return[-r*Math.sin(ph)*Math.cos(th),r*Math.cos(ph),r*Math.sin(ph)*Math.sin(th)];}
function projPt(pt,VP){const[x,y,z]=pt,cx=VP[0]*x+VP[4]*y+VP[8]*z+VP[12],cy=VP[1]*x+VP[5]*y+VP[9]*z+VP[13],cw=VP[3]*x+VP[7]*y+VP[11]*z+VP[15];if(Math.abs(cw)<.0001)return null;return[(cx/cw*.5+.5)*canvas3.width,(1-(cy/cw*.5+.5))*canvas3.height];}

// Sphere
function buildSphere(R,la,lo){const v=[],idx=[];for(let i=0;i<=la;i++){const t=i/la*Math.PI;for(let j=0;j<=lo;j++){const p=j/lo*2*Math.PI;v.push(R*Math.sin(t)*Math.cos(p),R*Math.cos(t),R*Math.sin(t)*Math.sin(p));}}for(let i=0;i<la;i++)for(let j=0;j<lo;j++){const a=i*(lo+1)+j,b=a+lo+1;idx.push(a,b,a+1,b,b+1,a+1);}return{v:new Float32Array(v),idx:new Uint16Array(idx)};}
const sph=buildSphere(1,64,96);
const globeVBO=mkVBO(sph.v);
const globeIBO=(()=>{const b=gl.createBuffer();gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,b);gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,sph.idx,gl.STATIC_DRAW);return b;})();

// Camera
let rX=0.3, rY=0, camD=2.7, drag3=false, lx3=0, ly3=0, autoRot=true;
function eyePos(){const cx=Math.cos(rX),sx=Math.sin(rX),cy=Math.cos(rY),sy=Math.sin(rY);return[-camD*cx*sy,camD*sx,camD*cx*cy];}
function getVP(){const e=eyePos(),V=m4(),P=m4(),VP=m4();lookAt(V,e,[0,0,0],[0,1,0]);persp(P,Math.PI/4,canvas3.width/canvas3.height,.1,100);mul4(VP,P,V);return{VP,eye:e};}

canvas3.addEventListener('mousedown',e=>{drag3=true;lx3=e.clientX;ly3=e.clientY;stopRot();});
addEventListener('mouseup',()=>{drag3=false;});
canvas3.addEventListener('mousemove',e=>{

  if(drag3){rY+=(e.clientX-lx3)*.005;rX+=(e.clientY-ly3)*.005;rX=Math.max(-1.4,Math.min(1.4,rX));lx3=e.clientX;ly3=e.clientY;draw3();hideCard();return;}
  handleHover3(e);
});
canvas3.addEventListener('wheel',e=>{camD=Math.max(1.35,Math.min(6,camD+e.deltaY*.003));draw3();},{passive:true});
canvas3.addEventListener('mouseleave',()=>hideCard());

addEventListener('touchend',()=>drag3=false);

// GPU buffers for 3D
const bufs3 = {};
let borderBuf3 = null;

function buildPointBuf(disasters){
  const pos=[], col=[], sz=[];
  disasters.forEach(d=>{
    const cfg=TYPE_CFG[d.type]||TYPE_CFG.other;
    const[x,y,z]=ll2xyz(d.lat,d.lon,1.008);
    pos.push(x,y,z);
    col.push(cfg.color[0]/255,cfg.color[1]/255,cfg.color[2]/255);
    sz.push(15.0);
  });
  return {
    posVBO: mkVBO(new Float32Array(pos)),
    colVBO: mkVBO(new Float32Array(col)),
    szVBO:  mkVBO(new Float32Array(sz)),
    count:  disasters.length,
    disasters,
  };
}

function buildLineBuf3(geo){
  const pos=[],idx=[];
  geo.features.forEach(feat=>{
    const g=feat.geometry; if(!g)return;
    const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:[];
    polys.forEach(poly=>poly.forEach(ring=>{
      const si=pos.length/3;
      ring.forEach(c=>{const[x,y,z]=ll2xyz(c[1],c[0],1.002);pos.push(x,y,z);});
      for(let i=0;i<ring.length-1;i++)idx.push(si+i,si+i+1);
    }));
  });
  return{posVBO:mkVBO(new Float32Array(pos)),idxBuf:mkIBO(idx),count:idx.length};
}

function draw3(){
  if(!is3D)return;
  gl.clearColor(.018,.038,.078,1);
  gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);
  const{VP,eye}=getVP();

  // Globe
  gl.disable(gl.BLEND);
  gl.useProgram(globeProg);
  gl.uniformMatrix4fv(gl.getUniformLocation(globeProg,'uMVP'),false,VP);
  gl.bindBuffer(gl.ARRAY_BUFFER,globeVBO);
  const gA=gl.getAttribLocation(globeProg,'aPos');
  gl.enableVertexAttribArray(gA);gl.vertexAttribPointer(gA,3,gl.FLOAT,false,0,0);
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,globeIBO);
  gl.drawElements(gl.TRIANGLES,sph.idx.length,gl.UNSIGNED_SHORT,0);

  // Borders
  gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
  if(borderBuf3&&vis['borders']){
    gl.useProgram(lineProg);
    gl.uniformMatrix4fv(gl.getUniformLocation(lineProg,'uMVP'),false,VP);
    gl.uniform3fv(gl.getUniformLocation(lineProg,'uEye'),eye);
    gl.uniform3f(gl.getUniformLocation(lineProg,'uCol'),.204,.373,.533);
    gl.uniform1f(gl.getUniformLocation(lineProg,'uA'),.42);
    gl.bindBuffer(gl.ARRAY_BUFFER,borderBuf3.posVBO);
    const la=gl.getAttribLocation(lineProg,'aPos');
    gl.enableVertexAttribArray(la);gl.vertexAttribPointer(la,3,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,borderBuf3.idxBuf);
    gl.drawElements(gl.LINES,borderBuf3.count,gl.UNSIGNED_INT,0);
  }

  // Disaster points
  gl.blendFunc(gl.SRC_ALPHA,gl.ONE);
  gl.useProgram(ptProg);
  gl.uniformMatrix4fv(gl.getUniformLocation(ptProg,'uMVP'),false,VP);
  gl.uniform3fv(gl.getUniformLocation(ptProg,'uEye'),eye);
  const pa=gl.getAttribLocation(ptProg,'aPos');
  const ca=gl.getAttribLocation(ptProg,'aCol');
  const sa=gl.getAttribLocation(ptProg,'aSz');

  Object.entries(bufs3).forEach(([type,buf])=>{
    if(!vis[type])return;
    gl.bindBuffer(gl.ARRAY_BUFFER,buf.posVBO);gl.enableVertexAttribArray(pa);gl.vertexAttribPointer(pa,3,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,buf.colVBO);gl.enableVertexAttribArray(ca);gl.vertexAttribPointer(ca,3,gl.FLOAT,false,0,0);
    gl.bindBuffer(gl.ARRAY_BUFFER,buf.szVBO);gl.enableVertexAttribArray(sa);gl.vertexAttribPointer(sa,1,gl.FLOAT,false,0,0);
    gl.drawArrays(gl.POINTS,0,buf.count);
  });
}

// 3D hover
let hovT3=null;
function handleHover3(e){
  if(drag3)return;
  clearTimeout(hovT3);
  hovT3=setTimeout(()=>{
    const{VP,eye}=getVP();
    const camN=n3(eye);
    let best=null,bestD=18;
    DISASTERS.forEach(d=>{
      if(!vis[d.type])return;
      const[x,y,z]=ll2xyz(d.lat,d.lon,1.008);
      if(dot3(n3([x,y,z]),camN)<.05)return;
      const sc=projPt([x,y,z],VP);
      if(!sc)return;
      const dd=Math.hypot(sc[0]-e.clientX,sc[1]-e.clientY);
      if(dd<bestD){bestD=dd;best=d;}
    });
    if(best)showCard(best,e.clientX,e.clientY);
    else hideCard();
  },25);
}

// CANVAS 2D (FLAT MAP)
// ═══════════════════════════════════════════════
let W2,H2,baseW,baseH,offsetX=0,offsetY=0,scale2=1;
let drag2=false,lx2=0,ly2=0;
let bordersGeo=null;

const _yMax=Math.log(Math.tan(85*Math.PI/180)+1/Math.cos(85*Math.PI/180));

function ll2px(lat,lon){
  const mW=baseW*scale2,mH=baseH*scale2;
  const x=(lon+180)/360*mW;
  const latR=Math.max(-85,Math.min(85,lat))*Math.PI/180;
  const yM=Math.log(Math.tan(latR)+1/Math.cos(latR));
  const y=(1-(yM+_yMax)/(2*_yMax))*mH;
  return[x+offsetX,y+offsetY];
}

function computeBase(){
  const availW=W2-220, availH=H2;
  const asp=Math.PI/_yMax;
  if(availW/availH>asp){baseH=Math.floor(availH*.94);baseW=Math.floor(baseH*asp);}
  else{baseW=Math.floor(availW*.96);baseH=Math.floor(baseW/asp);}
  offsetX=Math.floor((availW-baseW)/2);
  offsetY=Math.floor((availH-baseH)/2);
}

function resize2(){
  W2=canvas2.width=window.innerWidth;
  H2=canvas2.height=window.innerHeight;
  scale2=1; computeBase();
}
resize2();

function resetView2(){scale2=1;computeBase();}

const ctx=canvas2.getContext('2d');

function drawRing2(ring){
  if(ring.length<2)return;
  ctx.beginPath();let first=true;
  for(let i=0;i<ring.length;i++){
    const[px,py]=ll2px(ring[i][1],ring[i][0]);
    if(first){ctx.moveTo(px,py);first=false;continue;}
    if(Math.abs(ring[i][0]-ring[i-1][0])>180){ctx.moveTo(px,py);continue;}
    ctx.lineTo(px,py);
  }ctx.stroke();
}

let hoverPt2=null;

function draw2(){
  if(is3D)return;
  const mW=baseW*scale2,mH=baseH*scale2;
  ctx.clearRect(0,0,W2,H2);
  ctx.fillStyle='#050a14';ctx.fillRect(0,0,W2,H2);
  ctx.fillStyle='#081422';ctx.fillRect(offsetX,offsetY,mW,mH);
  ctx.strokeStyle='rgba(26,47,69,0.8)';ctx.lineWidth=1;ctx.strokeRect(offsetX,offsetY,mW,mH);
  // Grid
  ctx.strokeStyle='rgba(22,42,64,0.5)';ctx.lineWidth=.5;
  for(let lon=-180;lon<=180;lon+=30){const[x]=ll2px(0,lon);ctx.beginPath();ctx.moveTo(x,offsetY);ctx.lineTo(x,offsetY+mH);ctx.stroke();}
  for(let lat=-80;lat<=80;lat+=20){const[,y]=ll2px(lat,0);ctx.beginPath();ctx.moveTo(offsetX,y);ctx.lineTo(offsetX+mW,y);ctx.stroke();}
  // Borders
  if(bordersGeo&&vis['borders']){
    ctx.strokeStyle='rgba(52,95,138,0.55)';ctx.lineWidth=Math.max(.5,.7*Math.sqrt(scale2));
    bordersGeo.features.forEach(feat=>{
      const g=feat.geometry;if(!g)return;
      const polys=g.type==='Polygon'?[g.coordinates]:g.type==='MultiPolygon'?g.coordinates:[];
      polys.forEach(poly=>poly.forEach(ring=>drawRing2(ring)));
    });
  }
  // Disaster points
  DISASTERS.forEach(d=>{
    if(!vis[d.type])return;
    const cfg=TYPE_CFG[d.type]||TYPE_CFG.other;
    const[px,py]=ll2px(d.lat,d.lon);
    if(px<-20||px>W2+20||py<-20||py>H2+20)return;
    const r=Math.max(2.5,5.5*Math.sqrt(scale2));
    const[cr,cg,cb]=cfg.color;
    // Glow
    ctx.shadowColor=`rgb(${cr},${cg},${cb})`;ctx.shadowBlur=r*2.5;
    // Outer ring
    ctx.strokeStyle=`rgba(${cr},${cg},${cb},0.6)`;
    ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(px,py,r,0,Math.PI*2);ctx.stroke();
    // Fill dot
    ctx.fillStyle=`rgba(${cr},${cg},${cb},0.85)`;
    ctx.shadowBlur=r*1.5;
    ctx.beginPath();ctx.arc(px,py,r*.45,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });
  // Hover highlight
  if(hoverPt2){
    const cfg=TYPE_CFG[hoverPt2.type]||TYPE_CFG.other;
    const[px,py]=ll2px(hoverPt2.lat,hoverPt2.lon);
    const[cr,cg,cb]=cfg.color;
    ctx.strokeStyle=`rgb(${cr},${cg},${cb})`;ctx.lineWidth=2;
    ctx.shadowColor=`rgb(${cr},${cg},${cb})`;ctx.shadowBlur=10;
    const hr=Math.max(5,7*Math.sqrt(scale2));
    ctx.beginPath();ctx.arc(px,py,hr,0,Math.PI*2);ctx.stroke();
    ctx.shadowBlur=0;
  }
  updateStatBar();
}

// 2D interaction
canvas2.addEventListener('mousedown',e=>{drag2=true;lx2=e.clientX;ly2=e.clientY;hideCard();});
addEventListener('mouseup',()=>drag2=false);
canvas2.addEventListener('mousemove',e=>{
  if(!is3D&&drag2){offsetX+=e.clientX-lx2;offsetY+=e.clientY-ly2;lx2=e.clientX;ly2=e.clientY;draw2();return;}
  if(!is3D)handleHover2(e);
});
canvas2.addEventListener('mouseleave',()=>{hideCard();hoverPt2=null;});
canvas2.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.15:1/1.15,mx=e.clientX,my=e.clientY;
  offsetX=mx-(mx-offsetX)*f;offsetY=my-(my-offsetY)*f;
  scale2=Math.max(1,Math.min(50,scale2*f));
  draw2();
},{passive:false});

document.getElementById('zoom-in').addEventListener('click',()=>{const cx=W2/2,cy=H2/2;offsetX=cx-(cx-offsetX)*1.4;offsetY=cy-(cy-offsetY)*1.4;scale2=Math.min(50,scale2*1.4);draw2();});
document.getElementById('zoom-out').addEventListener('click',()=>{if(scale2<=1)return;const cx=W2/2,cy=H2/2;offsetX=cx-(cx-offsetX)/1.4;offsetY=cy-(cy-offsetY)/1.4;scale2=Math.max(1,scale2/1.4);draw2();});
document.getElementById('reset-v').addEventListener('click',()=>{resetView2();draw2();});

let hovT2=null;
function handleHover2(e){
  clearTimeout(hovT2);
  hovT2=setTimeout(()=>{
    const thresh=Math.max(10,12/Math.sqrt(scale2));
    let best=null,bestD=thresh;
    DISASTERS.forEach(d=>{
      if(!vis[d.type])return;
      const[px,py]=ll2px(d.lat,d.lon);
      const dd=Math.hypot(px-e.clientX,py-e.clientY);
      if(dd<bestD){bestD=dd;best=d;}
    });
    hoverPt2=best;
    if(best)showCard(best,e.clientX,e.clientY);
    else hideCard();
    draw2();
  },20);
}

addEventListener('touchend',()=>drag2=false);

  if(e.touches.length===2){const nd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);const cx=(e.touches[0].clientX+e.touches[1].clientX)/2,cy=(e.touches[0].clientY+e.touches[1].clientY)/2;const f=nd/td2;offsetX=cx-(cx-offsetX)*f;offsetY=cy-(cy-offsetY)*f;scale2=Math.max(1,Math.min(50,scale2*f));td2=nd;draw2();}
},{passive:true});

// CARD POPUP
// ═══════════════════════════════════════════════
const card=document.getElementById('card');
const cardImg=document.getElementById('card-img');
const cardPlaceholder=document.getElementById('card-placeholder');
const cardLoading=document.getElementById('card-loading');

const TYPE_EMOJI={heat:'🌡️',wildfire:'🔥',flood:'🌊',hurricane:'🌀',storm:'⚡',drought:'☀️',pollution:'🏭',['sea level rise']:'🌊',pests:'🦗',other:'⚠️'};

let imgCache={};

function showCard(d,mx,my){
  const cfg=TYPE_CFG[d.type]||TYPE_CFG.other;
  document.getElementById('card-dot').style.background=cfg.hex;
  document.getElementById('card-type-label').textContent=cfg.label.toUpperCase();
  document.getElementById('card-type-label').style.color=cfg.hex;
  document.getElementById('card-location').textContent=d.location;
  document.getElementById('card-date').textContent=d.date||'Date unknown';

  // Position
  const cw=220,ch=220;
  const lft=mx+16+cw>window.innerWidth-230?mx-cw-8:mx+16;
  const top=Math.max(8,Math.min(my-40,window.innerHeight-ch-8));
  card.style.cssText=`display:block;left:${lft}px;top:${top}px;`;
  card.style.borderColor=cfg.hex+'44';

  // Image
  const url=SUPABASE_BASE+'/'+d.photo;
  if(imgCache[d.id]==='ok'){
    cardLoading.style.display='none';
    cardPlaceholder.style.display='none';
    cardImg.style.display='block';
    cardImg.src=url;
  } else if(imgCache[d.id]==='err'){
    cardLoading.style.display='none';
    cardImg.style.display='none';
    cardPlaceholder.style.display='flex';
    cardPlaceholder.textContent=TYPE_EMOJI[d.type]||'⚠️';
  } else {
    cardLoading.style.display='flex';
    cardImg.style.display='none';
    cardPlaceholder.style.display='none';
    const img=new Image();
    img.onload=()=>{
      imgCache[d.id]='ok';
      cardLoading.style.display='none';
      cardPlaceholder.style.display='none';
      cardImg.style.display='block';
      cardImg.src=url;
    };
    img.onerror=()=>{
      imgCache[d.id]='err';
      cardLoading.style.display='none';
      cardImg.style.display='none';
      cardPlaceholder.style.display='flex';
      cardPlaceholder.textContent=TYPE_EMOJI[d.type]||'⚠️';
    };
    img.src=url;
  }
}

function hideCard(){card.style.display='none';}

// ═══════════════════════════════════════════════
function buildPanel(){
  const scroll=document.getElementById('panel-scroll');
  scroll.innerHTML='';

  function makeRow(key,color,label,count){
    const r=document.createElement('div');
    r.className='row'+(vis[key]?'':' off');
    r.dataset.key=key;
    r.innerHTML=`<div class="sw dot" style="background:${color};box-shadow:0 0 6px ${color}44"></div><span class="rl">${label}</span><span class="rc">${count}</span><div class="tog"></div>`;
    r.addEventListener('click',()=>{
      vis[key]=!vis[key];
      r.classList.toggle('off',!vis[key]);
      if(is3D)draw3();else draw2();
      updateStatBar();
    });
    return r;
  }

  function makeSec(label,keys){
    const wrap=document.createElement('div');wrap.className='sec-wrap';
    const hdr=document.createElement('div');hdr.className='sec';
    hdr.innerHTML=`<span class="sec-label">${label}</span><span class="sec-tog">▾</span>`;
    wrap.appendChild(hdr);
    hdr.addEventListener('click',e=>{
      const tog=hdr.querySelector('.sec-tog');
      const rect=hdr.getBoundingClientRect();
      if(e.clientX>rect.right-30){
        const anyOn=keys.some(k=>vis[k]);
        keys.forEach(k=>{vis[k]=!anyOn;const row=wrap.querySelector(`[data-key="${k}"]`);if(row)row.classList.toggle('off',!vis[k]);});
        wrap.classList.toggle('sec-off',!keys.some(k=>vis[k]));
        if(is3D)draw3();else draw2();
        updateStatBar();
      }else{
        wrap.classList.toggle('collapsed');
        tog.textContent=wrap.classList.contains('collapsed')?'▸':'▾';
      }
    });
    return wrap;
  }

  // Map section
  const mapSec=makeSec('Map',['borders']);
  const bRow=document.createElement('div');bRow.className='row'+(vis['borders']?'':' off');bRow.dataset.key='borders';
  bRow.innerHTML=`<div class="sw line" style="background:#34608a"></div><span class="rl">Country Borders</span><div class="tog"></div>`;
  bRow.addEventListener('click',()=>{vis['borders']=!vis['borders'];bRow.classList.toggle('off',!vis['borders']);if(is3D)draw3();else draw2();});
  mapSec.appendChild(bRow);scroll.appendChild(mapSec);

  // Disasters by type
  const typeCounts={};
  DISASTERS.forEach(d=>typeCounts[d.type]=(typeCounts[d.type]||0)+1);
  const typeOrder=['heat','wildfire','flood','hurricane','storm','drought','pollution','sea level rise','pests','other'];
  const disSec=makeSec('Disaster Type',typeOrder);
  typeOrder.forEach(t=>{
    const cfg=TYPE_CFG[t];
    const n=typeCounts[t]||0;
    if(!n)return;
    disSec.appendChild(makeRow(t,cfg.hex,cfg.label,n));
  });
  scroll.appendChild(disSec);

  // Toggle all
  document.getElementById('toggle-all').addEventListener('click',()=>{
    allOn=!allOn;
    document.getElementById('toggle-all').textContent=allOn?'All Off':'All On';
    [...typeOrder,'borders'].forEach(k=>vis[k]=allOn);
    scroll.querySelectorAll('.row').forEach(r=>r.classList.toggle('off',!allOn));
    scroll.querySelectorAll('.sec-wrap').forEach(w=>w.classList.toggle('sec-off',!allOn));
    if(is3D)draw3();else draw2();
    updateStatBar();
  });
}

// ═══════════════════════════════════════════════
// TOPOJSON → GEOJSON
// ═══════════════════════════════════════════════
function topoToGeo(topo){
  const sc=topo.transform?.scale||[1,1],tr=topo.transform?.translate||[0,0];
  const arcs=topo.arcs.map(arc=>{let x=0,y=0;return arc.map(p=>{x+=p[0];y+=p[1];return[x*sc[0]+tr[0],y*sc[1]+tr[1]];});});
  function getArc(i){return i>=0?arcs[i]:arcs[~i].slice().reverse();}
  function toRing(ids){return ids.flatMap((i,j)=>{const a=getArc(i);return j<ids.length-1?a.slice(0,-1):a;});}
  const obj=topo.objects.countries||topo.objects.land||Object.values(topo.objects)[0];
  return{type:'FeatureCollection',features:obj.geometries.map(geom=>{
    if(geom.type==='Polygon')return{type:'Feature',geometry:{type:'Polygon',coordinates:geom.arcs.map(toRing)},properties:{}};
    if(geom.type==='MultiPolygon')return{type:'Feature',geometry:{type:'MultiPolygon',coordinates:geom.arcs.map(p=>p.map(toRing))},properties:{}};
    return null;
  }).filter(Boolean)};
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function setLoad(pct,msg){
  document.getElementById('load-bar').style.width=pct+'%';
  if(msg)document.getElementById('load-msg').textContent=msg;
}

function init(){
  setLoad(10,'Building event layers…');

  // Group disasters by type for GPU buffers
  const byType={};
  DISASTERS.forEach(d=>{
    const t=d.type||'other';
    if(!byType[t])byType[t]=[];
    byType[t].push(d);
  });
  Object.entries(byType).forEach(([t,ds])=>{
    bufs3[t]=buildPointBuf(ds);
  });
  vis['borders']=true;

  setLoad(35,'Building panel…');
  buildPanel();
  updateStatBar();

  setLoad(55,'Fetching borders…');
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2.0.2/countries-110m.json')
    .then(r=>r.json())
    .then(topo=>{
      setLoad(80,'Processing borders…');
      bordersGeo=topoToGeo(topo);
      borderBuf3=buildLineBuf3(bordersGeo);
      finish();
    })
    .catch(()=>finish());
}

function finish(){
  setLoad(100,'');
  setTimeout(()=>document.getElementById('loading').style.display='none',300);
  draw3();
}

init();

// Render loop (3D only)
(function loop(){
  if(is3D&&autoRot){rY+=.0012;draw3();}
  requestAnimationFrame(loop);
})();
</script>
