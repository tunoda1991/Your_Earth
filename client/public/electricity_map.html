<title>Live Electricity Map — Your Earth</title>
<style>
:root {
  --bg:#050a14; --panel:rgba(6,13,26,0.94); --border:#1a2f45;
  --dim:#3a5a7a; --mid:#6a8fa8; --text:#a0c4d8; --accent:#7ab3cc;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh;}
#globe-canvas{display:block;position:absolute;inset:0;}
#flat-canvas{display:none;position:absolute;inset:0;cursor:grab;}
#flat-canvas:active{cursor:grabbing;}
#header{position:fixed;top:12px;left:0;right:300px;padding:0 22px;pointer-events:none;z-index:10;}
#header h1{font-size:11px;letter-spacing:.35em;text-transform:uppercase;color:var(--accent);font-weight:400;font-family:'Courier New',monospace;}
#header p{font-size:9px;letter-spacing:.18em;color:var(--dim);margin-top:3px;}
#view-toggle{position:fixed;top:12px;right:312px;z-index:20;display:flex;border:1px solid var(--border);overflow:hidden;backdrop-filter:blur(8px);}
#view-toggle button{padding:6px 13px;background:var(--panel);color:var(--dim);font-family:'Courier New',monospace;font-size:9px;letter-spacing:.18em;text-transform:uppercase;border:none;cursor:pointer;transition:all .2s;}
#view-toggle button.active{background:rgba(122,179,204,.12);color:var(--accent);}
#view-toggle button:hover:not(.active){color:var(--text);}
#globe-controls{position:fixed;bottom:18px;left:22px;z-index:20;}
#flat-controls{position:fixed;bottom:18px;left:22px;display:none;flex-direction:column;gap:4px;z-index:20;}
#flat-controls button{padding:5px 14px;border:1px solid var(--border);background:var(--panel);color:var(--mid);font-family:'Courier New',monospace;font-size:9px;letter-spacing:.15em;cursor:pointer;text-transform:uppercase;transition:all .2s;backdrop-filter:blur(8px);}
#flat-controls button:hover{border-color:var(--accent);color:var(--accent);}
#globe-controls button{padding:7px 14px;border:1px solid var(--border);background:var(--panel);color:var(--mid);font-family:'Courier New',monospace;font-size:9px;letter-spacing:.18em;cursor:pointer;text-transform:uppercase;transition:all .2s;backdrop-filter:blur(8px);display:flex;align-items:center;gap:7px;}
#globe-controls button:hover{border-color:var(--accent);color:var(--accent);}
#globe-controls button.active{border-color:#4a9a7a;color:#4a9a7a;}
.ctrl-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
#hover-tooltip{position:fixed;display:none;pointer-events:none;background:rgba(4,9,20,0.95);border:1px solid var(--border);padding:8px 12px;z-index:80;backdrop-filter:blur(8px);white-space:nowrap;}
#hover-tooltip .ht-name{font-size:11px;font-weight:700;color:#d8eef8;letter-spacing:.04em;margin-bottom:3px;}
#hover-tooltip .ht-val{font-size:9px;letter-spacing:.08em;}
#right-panel{position:fixed;top:0;right:0;bottom:0;width:300px;background:var(--panel);border-left:1px solid var(--border);backdrop-filter:blur(12px);display:flex;flex-direction:column;z-index:10;}
#signal-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.signal-tab{flex:1;padding:10px 4px;text-align:center;font-size:9px;letter-spacing:.1em;color:var(--dim);text-transform:uppercase;cursor:pointer;border:none;background:none;font-family:'Courier New',monospace;transition:color .2s,background .2s;border-bottom:2px solid transparent;}
.signal-tab:hover{color:var(--text);background:rgba(255,255,255,.02);}
.signal-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
#panel-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
#panel-header h2{font-size:10px;letter-spacing:.2em;color:var(--text);text-transform:uppercase;font-weight:400;margin-bottom:6px;}
.live-badge{display:inline-flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;}
.live-dot{width:5px;height:5px;border-radius:50%;background:#22c55e;animation:pulse-dot 2s infinite;}
@keyframes pulse-dot{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.4);}50%{opacity:.7;box-shadow:0 0 0 4px rgba(34,197,94,0);}}
#legend{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
#legend-bar{height:8px;border-radius:4px;margin-bottom:4px;}
#legend-labels{display:flex;justify-content:space-between;font-size:9px;letter-spacing:.1em;color:var(--dim);}
#panel-borders{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
#panel-borders .panel-border-btn{padding:6px 12px;border:1px solid var(--border);background:var(--panel);color:var(--mid);font-family:'Courier New',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:all .2s;}
#panel-borders .panel-border-btn:hover{border-color:var(--accent);color:var(--accent);}
#panel-borders .panel-border-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(122,179,204,.1);}
#zone-list{flex:1;overflow-y:auto;padding:4px 0;}
#zone-list::-webkit-scrollbar{width:3px;}
#zone-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.zone-row{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;transition:background .15s;}
.zone-row:hover{background:rgba(255,255,255,.03);}
.zone-row.highlighted{background:rgba(122,179,204,.08);}
.zone-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.zone-name{flex:1;font-size:10px;color:var(--mid);letter-spacing:.03em;}
.zone-value{font-size:10px;font-weight:700;letter-spacing:.03em;flex-shrink:0;}
.zone-unit{font-size:9px;color:var(--dim);margin-left:2px;}
#detail-card{position:fixed;top:16px;right:316px;width:260px;background:rgba(4,9,20,0.97);border:1px solid var(--border);backdrop-filter:blur(12px);z-index:60;display:none;}
#detail-card .dc-header{padding:12px 14px 8px;border-bottom:1px solid var(--border);}
#detail-card .dc-zone{font-size:9px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:2px;}
#detail-card .dc-name{font-size:13px;color:#d8eef8;font-weight:700;letter-spacing:.04em;}
#detail-card .dc-body{padding:10px 14px 14px;}
.dc-metric{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;}
.dc-metric-label{font-size:9px;letter-spacing:.12em;color:var(--dim);text-transform:uppercase;}
.dc-metric-value{font-size:12px;font-weight:700;}
.dc-mix-bar{height:12px;border-radius:3px;display:flex;overflow:hidden;margin:8px 0 4px;background:var(--border);}
.dc-mix-bar div{height:100%;}
.dc-mix-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.dc-mix-item{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--dim);letter-spacing:.08em;}
.dc-mix-swatch{width:6px;height:6px;border-radius:1px;}
.dc-updated{font-size:9px;color:var(--dim);letter-spacing:.1em;margin-top:8px;text-transform:uppercase;}
#hint{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.15em;color:var(--dim);pointer-events:none;z-index:10;text-transform:uppercase;font-family:'Courier New',monospace;white-space:nowrap;}
#citation{position:fixed;bottom:5px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:.15em;color:var(--dim);pointer-events:none;z-index:10;opacity:.5;font-family:'Courier New',monospace;text-transform:uppercase;white-space:nowrap;}
</style>

  return'#'+((1<<24)+(Math.round(ar+(br-ar)*t)<<16)+(Math.round(ag+(bg-ag)*t)<<8)+Math.round(ab+(bb-ab)*t)).toString(16).slice(1);
}
function ciColor(v){
  v=Math.max(0,v);
  if(v<=150)return lerp('#22c55e','#84cc16',v/150);
  if(v<=300)return lerp('#84cc16','#eab308',(v-150)/150);
  if(v<=450)return lerp('#eab308','#f97316',(v-300)/150);
  if(v<=600)return lerp('#f97316','#ef4444',(v-450)/150);
  return'#ef4444';
}
function renewColor(v){v=Math.max(0,Math.min(100,v));if(v>=80)return'#22c55e';if(v>=60)return'#84cc16';if(v>=40)return'#eab308';if(v>=20)return'#f97316';return'#ef4444';}
function fossilColor(v){v=Math.max(0,Math.min(100,v));if(v<=20)return'#22c55e';if(v<=40)return'#84cc16';if(v<=60)return'#eab308';if(v<=80)return'#f97316';return'#ef4444';}

// Returns a 6-char hex or null — NO alpha suffix appended here
function getRen(code){const d=zoneData[code];return d?.ren??STATIC_REN[code]??null;}
function getFos(code){const d=zoneData[code];return d?.fos??STATIC_FOS[code]??null;}
function getColor(code){
  const d=zoneData[code];
  if(activeSignal==='carbon'){if(d)return ciColor(d.ci??0);if(STATIC_CI[code]!=null)return ciColor(STATIC_CI[code]);return null;}
  if(activeSignal==='renewable'){const v=getRen(code);return v!=null?renewColor(v):null;}
  if(activeSignal==='fossil'){const v=getFos(code);return v!=null?fossilColor(v):null;}
  return null;
}
function getValue(code){
  const d=zoneData[code];
  if(activeSignal==='carbon'){
    if(d)return(d.ci??0).toFixed(0);
    if(STATIC_CI[code]!=null)return STATIC_CI[code].toFixed(0);
    return'--';
  }
  if(activeSignal==='renewable'){const v=getRen(code);return v!=null?v.toFixed(1):'--';}
  if(activeSignal==='fossil'){const v=getFos(code);return v!=null?v.toFixed(1):'--';}
  return'--';
}
function getUnit(){return activeSignal==='carbon'?'gCO\u2082/kWh':'%';}
function getName(code){return NAMES[code]||code;}
function isStaticOnly(code){return!zoneData[code]&&STATIC_CI[code]!=null;}

// ── TopoJSON decoder ────────────────────────────────────
function topoToFeatures(topo){
  const sc=topo.transform?.scale||[1,1],tr=topo.transform?.translate||[0,0];
  const arcs=topo.arcs.map(arc=>{let x=0,y=0;return arc.map(p=>{x+=p[0];y+=p[1];return[x*sc[0]+tr[0],y*sc[1]+tr[1]];});});
  function getArc(i){return i>=0?arcs[i]:arcs[~i].slice().reverse();}
  function toRing(ids){return ids.flatMap((id,j)=>{const a=getArc(id);return j<ids.length-1?a.slice(0,-1):a;});}
  const obj=topo.objects.countries||Object.values(topo.objects)[0];
  return obj.geometries.map(geom=>{
    const code=ISO_MAP[String(geom.id).padStart(3,'0')]||null;
    let rings=[];
    if(geom.type==='Polygon')rings=geom.arcs.map(toRing);
    if(geom.type==='MultiPolygon')rings=geom.arcs.flatMap(p=>p.map(toRing));
    return{code,rings};
  });
}

const GC=document.getElementById('globe-canvas');
const renderer=new THREE.WebGLRenderer({canvas:GC,antialias:true,alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(0,0,3.2);
// MeshBasicMaterial needs no lights

const R=1;
// Plain sphere — texture painted in paintGlobeTexture() (ocean + grid + countries)
const earth=new THREE.Mesh(new THREE.SphereGeometry(R,64,64),new THREE.MeshBasicMaterial({color:0x081422}));
scene.add(earth);
// No separate atmosphere or line objects — grid is baked into the canvas texture

function v3(lat,lon,r){
  const p=(90-lat)*Math.PI/180,t=(lon+180)*Math.PI/180;
  return new THREE.Vector3(-r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));
}

// ── Globe texture: paint countries on canvas → apply to sphere ────────────
// This approach fills all countries correctly (no triangulation artifacts).
const TEX_W=4096, TEX_H=2048;
const texCanvas=document.createElement('canvas');
texCanvas.width=TEX_W; texCanvas.height=TEX_H;
const tx=texCanvas.getContext('2d');
const globeTex=new THREE.CanvasTexture(texCanvas);
earth.material=new THREE.MeshBasicMaterial({map:globeTex});

let borders3dVisible=true;

// Equirectangular lon/lat → texture pixel
function ll2tx(lat,lon){ return[(lon+180)/360*TEX_W,(90-lat)/180*TEX_H]; }


// Split one ring into sub-segments at antimeridian crossings.
// Returns array of segments; each segment is an array of [lon,lat] pairs.
// Phantom: <8 pts ring with an antimeridian jump.
function ringIsPhantom(ring){
  if(ring.length<8){for(let i=1;i<ring.length;i++)if(Math.abs(ring[i][0]-ring[i-1][0])>180)return true;}
  return false;
}
// Unwrap lons so no adjacent jump >180°. Points may go outside ±180 and clip naturally.
function unwrapRing(ring){
  const out=[[ring[0][0],ring[0][1]]];
  for(let i=1;i<ring.length;i++){
    let lo=ring[i][0],prev=out[i-1][0];
    while(lo-prev>180)lo-=360; while(lo-prev<-180)lo+=360;
    out.push([lo,ring[i][1]]);
  }
  return out;
}
function addRingToPath(ctx,ring,coordFn){
  if(ringIsPhantom(ring))return;
  const uw=unwrapRing(ring);
  const[x0,y0]=coordFn(uw[0][1],uw[0][0]); ctx.moveTo(x0,y0);
  for(let i=1;i<uw.length;i++){const[x,y]=coordFn(uw[i][1],uw[i][0]);ctx.lineTo(x,y);}
  ctx.closePath();
}
function txDrawCountry(ctx,rings,fillStyle){
  ctx.beginPath();
  for(const ring of rings) addRingToPath(ctx,ring,ll2tx);
  ctx.fillStyle=fillStyle; ctx.fill('evenodd');
}
function txDrawBorder(ctx,rings,strokeStyle,lw){
  ctx.strokeStyle=strokeStyle; ctx.lineWidth=lw;
  for(const ring of rings){
    if(ringIsPhantom(ring))continue;
    const uw=unwrapRing(ring);
    ctx.beginPath();
    const[x0,y0]=ll2tx(uw[0][1],uw[0][0]); ctx.moveTo(x0,y0);
    for(let i=1;i<uw.length;i++){const[x,y]=ll2tx(uw[i][1],uw[i][0]);ctx.lineTo(x,y);}
    ctx.stroke();
  }
}

function paintGlobeTexture(){
  tx.fillStyle='#081422'; tx.fillRect(0,0,TEX_W,TEX_H);
  // ── Lat/lon grid stripes (matching disasters.html globe visual) ──────────
  // Latitude lines every 20° (−80 to +80), longitude lines every 30°
  tx.save();
  tx.strokeStyle='rgba(18,46,90,0.70)';
  tx.lineWidth=1.5;
  // Latitude lines
  for(let lat=-80;lat<=80;lat+=20){
    const[,y]=ll2tx(lat,0);
    tx.beginPath();tx.moveTo(0,y);tx.lineTo(TEX_W,y);tx.stroke();
  }
  // Longitude lines
  for(let lon=-180;lon<180;lon+=30){
    const[x]=ll2tx(0,lon);
    tx.beginPath();tx.moveTo(x,0);tx.lineTo(x,TEX_H);tx.stroke();
  }
  tx.restore();
  // Fill countries
  for(const{code,rings}of countryFeatures){
    if(!code)continue;
    const color=getColor(code),hov=code===hoveredZone,stat=isStaticOnly(code);
    let fill;
    if(color){
      const r=parseInt(color.slice(1,3),16),g=parseInt(color.slice(3,5),16),b=parseInt(color.slice(5,7),16);
      fill='rgba('+r+','+g+','+b+','+(hov?1.0:stat?0.65:0.82)+')';
    } else {
      fill=hov?'rgba(60,120,170,0.75)':'rgba(20,55,90,0.65)';
    }
    txDrawCountry(tx,rings,fill);
  }
  // Borders
  if(borders3dVisible){
    for(const{code,rings}of countryFeatures){
      if(!code)continue;
      const hov=code===hoveredZone;
      txDrawBorder(tx,rings,hov?'rgba(180,220,255,0.95)':'rgba(52,95,138,0.55)',hov?2.5:1.0);
    }
  } else {
    // Still draw hovered country outline
    if(hoveredZone){
      for(const{code,rings}of countryFeatures){
        if(code===hoveredZone)txDrawBorder(tx,rings,'rgba(220,245,255,0.98)',3);
      }
    }
  }
  globeTex.needsUpdate=true;
}

// ── Invisible hit meshes for raycasting ───────────────────────────────────
const meshes={};

function buildHitMesh(code,rings){
  const pos=[],idx=[]; let base=0;
  for(const ring of rings){
    if(ring.length<3)continue;
    if(ringIsPhantom(ring))continue;
    const ring2=unwrapRing(ring);
    let clo=0,cla=0;
    for(const[lo,la]of ring2){clo+=lo;cla+=la;}
    clo/=ring2.length; while(clo>180)clo-=360; while(clo<-180)clo+=360;
    cla/=ring2.length;
    const cv=v3(cla,clo,R*1.003);
    pos.push(cv.x,cv.y,cv.z);
    const ci=base; base++;
    for(const[lo,la]of ring2){
      const wlo=((lo%360)+540)%360-180;
      pos.push(...v3(la,wlo,R*1.003).toArray()); base++;
    }
    const vcount=base-ci-1;
    for(let i=0;i<vcount-1;i++)idx.push(ci,ci+1+i,ci+2+i);
    if(vcount>1)idx.push(ci,ci+vcount,ci+1);
  }
  if(!pos.length)return;
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
  geo.setIndex(idx);
  const mat=new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide,depthWrite:false});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.renderOrder=2;
  scene.add(mesh);
  meshes[code]={mesh,mat};
}
function colorMesh(){ paintGlobeTexture(); }
function colorAllMeshes(){ paintGlobeTexture(); }

function buildAll(){
  for(const{code,rings}of countryFeatures){if(!code)continue;buildHitMesh(code,rings);}
  paintGlobeTexture();
}

// ── 3D Borders drawn in texture; bg3 group kept for rotation sync ────────
const bg3=new THREE.Group(); scene.add(bg3);
function buildBorders3d(){ /* handled in paintGlobeTexture */ }
// ── Star field (THREE.Points) ────────────────────────────────────────────────
(function(){
  const STAR_N=340;
  const positions=new Float32Array(STAR_N*3);
  const phases=new Float32Array(STAR_N);
  const speeds=new Float32Array(STAR_N);
  const bris=new Float32Array(STAR_N);
  for(let i=0;i<STAR_N;i++){
    const u=Math.random()*2-1,th=Math.random()*Math.PI*2,r=Math.sqrt(Math.max(0,1-u*u));
    positions[i*3]=r*Math.cos(th)*18;positions[i*3+1]=u*18;positions[i*3+2]=r*Math.sin(th)*18;
    phases[i]=Math.random()*Math.PI*2;
    speeds[i]=0.25+Math.random()*0.6;
    bris[i]=0.25+Math.random()*0.75;
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3));
  geo.setAttribute('phase',new THREE.BufferAttribute(phases,1));
  geo.setAttribute('speed',new THREE.BufferAttribute(speeds,1));
  geo.setAttribute('bri',new THREE.BufferAttribute(bris,1));
  const mat=new THREE.ShaderMaterial({
    uniforms:{uT:{value:0}},
    vertexShader:`attribute float phase;attribute float speed;attribute float bri;uniform float uT;varying float vA;void main(){float blink=0.55+0.45*sin(uT*speed+phase);vA=bri*blink;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);gl_PointSize=1.0+bri*1.6;}`,
    fragmentShader:`precision mediump float;varying float vA;void main(){float d=length(gl_PointCoord-.5)*2.;if(d>1.)discard;gl_FragColor=vec4(.80,.93,1.,vA*(1.-d*.4));}`,
    transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,
  });
  const stars=new THREE.Points(geo,mat);
  scene.add(stars);
  // Tick the uniform in the existing animate loop
  const _origAnimate=animate;
  let _starT=0,_starLast=performance.now();
  window._starMat=mat;
  window._starTick=function(){const now=performance.now();_starT+=(now-_starLast)/1000;_starLast=now;mat.uniforms.uT.value=_starT;};
})();

// ── Globe interaction ────────────────────────────────────
let drag=false,pm={x:0,y:0},autoRot=true,tRY=0,tRX=0;
GC.addEventListener('mousedown',e=>{drag=true;autoRot=false;pm={x:e.clientX,y:e.clientY};});
GC.addEventListener('mouseup',()=>drag=false);
GC.addEventListener('mousemove',e=>{
  if(drag){tRY+=(e.clientX-pm.x)*0.005;tRX+=(e.clientY-pm.y)*0.005;tRX=Math.max(-Math.PI/2,Math.min(Math.PI/2,tRX));pm={x:e.clientX,y:e.clientY};}
  checkHover3d(e);
});
GC.addEventListener('mouseleave',()=>{hideTooltip();hoveredZone=null;paintGlobeTexture();});
GC.addEventListener('wheel',e=>{e.preventDefault();camera.position.z=Math.max(1.8,Math.min(6,camera.position.z+e.deltaY*0.002));},{passive:false});

const rc=new THREE.Raycaster(),m2=new THREE.Vector2();
function checkHover3d(e){
  const r=GC.getBoundingClientRect();
  m2.x=((e.clientX-r.left)/r.width)*2-1;
  m2.y=-((e.clientY-r.top)/r.height)*2+1;
  rc.setFromCamera(m2,camera);
  let best=null,bestD=Infinity;
  for(const[c,{mesh}]of Object.entries(meshes)){
    const h=rc.intersectObject(mesh);
    if(h.length&&h[0].distance<bestD){
      // reject back-facing hits (ray and face normal point in same direction)
      if(h[0].face&&h[0].face.normal.clone().applyEuler(mesh.rotation).dot(rc.ray.direction)>0)continue;
      bestD=h[0].distance;best=c;
    }
  }
  if(best!==hoveredZone){
    hoveredZone=best;colorAllMeshes();
    if(best)showDetailCard(best);else hideDetailCard();
    updateList();
  }
  if(best)showTooltip(best,e.clientX,e.clientY);else hideTooltip();
}

function animate(){
  requestAnimationFrame(animate);
  if(autoRot)tRY+=0.001;
  const ry=earth.rotation.y+(tRY-earth.rotation.y)*0.1;
  const rx=earth.rotation.x+(tRX-earth.rotation.x)*0.1;
  earth.rotation.y=ry;earth.rotation.x=rx;
  for(const{mesh}of Object.values(meshes)){mesh.rotation.y=ry;mesh.rotation.x=rx;}
  bg3.rotation.y=ry;bg3.rotation.x=rx;
  if(window._starTick)window._starTick();
  renderer.render(scene,camera);
}
animate();

// 2D MAP
// ════════════════════════════════════════════════════════
const FC=document.getElementById('flat-canvas');
const fc=FC.getContext('2d');
let isFlat=false,fW,fH,fBW,fBH,fOX=0,fOY=0,fSc=1;
let fDrg=false,fLx=0,fLy=0,fHov=null,fMx=0,fMy=0,showB2d=true;

const YM=Math.log(Math.tan(85*Math.PI/180)+1/Math.cos(85*Math.PI/180));
function px(lat,lon){
  const mW=fBW*fSc,mH=fBH*fSc;
  const x=(lon+180)/360*mW;
  const lr=Math.max(-85,Math.min(85,lat))*Math.PI/180;
  const y=(1-(Math.log(Math.tan(lr)+1/Math.cos(lr))+YM)/(2*YM))*mH;
  return[x+fOX,y+fOY];
}
function base(){
  const aW=fW-300,aH=fH,asp=Math.PI/YM;
  if(aW/aH>asp){fBH=Math.floor(aH*.94);fBW=Math.floor(fBH*asp);}
  else{fBW=Math.floor(aW*.96);fBH=Math.floor(fBW/asp);}
  fOX=Math.floor((aW-fBW)/2);fOY=Math.floor((aH-fBH)/2);
}
function resize2d(){fW=FC.width=window.innerWidth;fH=FC.height=window.innerHeight;fSc=1;base();}

function drawRings2d(rings,fill,stroke){
  if(fill){
    fc.beginPath();
    for(const ring of rings){if(ring.length<3)continue;addRingToPath(fc,ring,px);}
    fc.fillStyle=fill; fc.fill('evenodd');
  }
  if(stroke){
    fc.strokeStyle=stroke; fc.lineWidth=Math.max(0.3,0.5*Math.sqrt(fSc));
    for(const ring of rings){
      if(ring.length<2||ringIsPhantom(ring))continue;
      const uw=unwrapRing(ring);
      fc.beginPath();
      const[x0,y0]=px(uw[0][1],uw[0][0]); fc.moveTo(x0,y0);
      for(let i=1;i<uw.length;i++){const[x,y]=px(uw[i][1],uw[i][0]);fc.lineTo(x,y);}
      fc.stroke();
    }
  }
}

function draw2d(){
  if(!isFlat)return;
  const mW=fBW*fSc,mH=fBH*fSc;
  fc.clearRect(0,0,fW,fH);
  fc.fillStyle='#050a14';fc.fillRect(0,0,fW,fH);
  fc.fillStyle='#081422';fc.fillRect(fOX,fOY,mW,mH);
  fc.strokeStyle='rgba(26,47,69,0.8)';fc.lineWidth=1;fc.strokeRect(fOX,fOY,mW,mH);
  // Grid
  fc.strokeStyle='rgba(22,42,64,0.5)';fc.lineWidth=.5;
  for(let lo=-180;lo<=180;lo+=30){const[x]=px(0,lo);fc.beginPath();fc.moveTo(x,fOY);fc.lineTo(x,fOY+mH);fc.stroke();}
  for(let la=-80;la<=80;la+=20){const[,y]=px(la,0);fc.beginPath();fc.moveTo(fOX,y);fc.lineTo(fOX+mW,y);fc.stroke();}
  // Country fills
  for(const{code,rings}of countryFeatures){
    if(!code)continue;
    const color=getColor(code),hov=code===fHov,stat=isStaticOnly(code);
    // Fill
    let fill;
    if(color){fill=color+(hov?'ff':stat?'88':'cc');}
    else{fill=hov?'rgba(40,90,140,0.70)':'rgba(15,40,70,0.55)';}
    drawRings2d(rings,fill,null);
  }
  // Border pass (separate so borders always on top of fills)
  if(showB2d){
    for(const{code,rings}of countryFeatures){
      if(!code)continue;
      const hov=code===fHov;
      const stroke=hov?'rgba(150,200,240,0.90)':'rgba(52,95,138,0.55)';
      drawRings2d(rings,null,stroke);
    }
  } else {
    // Even without borders, draw hovered outline
    if(fHov){
      for(const{code,rings}of countryFeatures){
        if(code===fHov)drawRings2d(rings,null,'rgba(200,230,255,0.75)');
      }
    }
  }
}

function ptIn(mx,my,rings){
  for(const ring of rings){
    let ins=false;
    for(let i=0,j=ring.length-1;i<ring.length;j=i++){
      const[loi,lai]=ring[i],[loj,laj]=ring[j];
      const[xi,yi]=px(lai,loi),[xj,yj]=px(laj,loj);
      if(((yi>my)!==(yj>my))&&(mx<(xj-xi)*(my-yi)/(yj-yi)+xi))ins=!ins;
    }
    if(ins)return true;
  }
  return false;
}

FC.addEventListener('mousedown',e=>{if(fSc>1){fDrg=true;fLx=e.clientX;fLy=e.clientY;}});
window.addEventListener('mouseup',()=>fDrg=false);
FC.addEventListener('mousemove',e=>{
  fMx=e.clientX;fMy=e.clientY;
  if(fDrg&&fSc>1){fOX+=e.clientX-fLx;fOY+=e.clientY-fLy;fLx=e.clientX;fLy=e.clientY;draw2d();return;}
  let hit=null;
  for(const{code,rings}of countryFeatures){if(!code)continue;if(ptIn(e.clientX,e.clientY,rings)){hit=code;break;}}
  if(hit!==fHov){
    fHov=hit;
    if(hit)showDetailCard(hit);else hideDetailCard();
    updateList();draw2d();
  }
  if(hit)showTooltip(hit,e.clientX,e.clientY);else hideTooltip();
});
FC.addEventListener('mouseleave',()=>{fHov=null;hideTooltip();hideDetailCard();draw2d();});
FC.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.15:1/1.15;
  fOX=e.clientX-(e.clientX-fOX)*f;fOY=e.clientY-(e.clientY-fOY)*f;
  fSc=Math.max(1,Math.min(40,fSc*f));if(fSc<=1)base();draw2d();
},{passive:false});

function updateList(){
  const list=document.getElementById('zone-list');
  const loaded=Object.keys(ZONES).filter(c=>zoneData[c]);
  loaded.sort((a,b)=>{
    const va=parseFloat(getValue(a)),vb=parseFloat(getValue(b));
    if(isNaN(va))return 1;if(isNaN(vb))return-1;
    return activeSignal==='renewable'?vb-va:va-vb;
  });
  const unloaded=Object.keys(ZONES).filter(c=>!zoneData[c]);
  list.innerHTML=[...loaded,...unloaded].map(code=>{
    const z=ZONES[code],v=getValue(code),color=getColor(code)||'#3a5a7a';
    const hl=code===hoveredZone?' highlighted':'';
    return`<div class="zone-row${hl}" onmouseenter="window._hZ('${code}')" onmouseleave="window._uhZ()">
      <div class="zone-dot" style="background:${color}"></div>
      <span class="zone-name">${z.name}</span>
      <span class="zone-value" style="color:${color}">${v}<span class="zone-unit">${v!=='--'?' '+getUnit():''}</span></span>
    </div>`;
  }).join('');
}
window._hZ=c=>{hoveredZone=c;showDetailCard(c);updateList();if(isFlat)draw2d();else colorAllMeshes();};
window._uhZ=()=>{hoveredZone=null;hideDetailCard();updateList();if(isFlat)draw2d();else colorAllMeshes();};

function showDetailCard(code){
  const d=zoneData[code],z=ZONES[code];
  if(!d||!z){hideDetailCard();return;}
  document.getElementById('dc-zone').textContent=code;
  document.getElementById('dc-name').textContent=z.name;
  const ci=document.getElementById('dc-carbon');
  ci.textContent=(d.ci??0).toFixed(0)+' gCO\u2082/kWh';ci.style.color=ciColor(d.ci??0);
  const rn=document.getElementById('dc-renewable');
  const renV=getRen(code),fosV=getFos(code);
  rn.textContent=renV!=null?renV.toFixed(1)+'%':'--'; rn.style.color=renV!=null?renewColor(renV):'#6a8fa8';
  const fo=document.getElementById('dc-fossil');
  fo.textContent=fosV!=null?fosV.toFixed(1)+'%':'--'; fo.style.color=fosV!=null?fossilColor(fosV):'#6a8fa8';
  const mix=d.mix||{};
  const mp={};for(const k of MIX_KEYS)mp[k]=Math.max(0,mix[k]||0)+(k==='hydro'?Math.max(0,mix['hydro discharge']||0):0);
  const tot=Object.values(mp).reduce((a,v)=>a+v,0);
  const bar=document.getElementById('dc-mix-bar'),leg=document.getElementById('dc-mix-legend');
  bar.innerHTML='';leg.innerHTML='';
  if(tot>0)for(const k of MIX_KEYS){const p=(mp[k]/tot)*100;if(p<0.5)continue;const dv=document.createElement('div');dv.style.width=p+'%';dv.style.background=MIX_COLORS[k];bar.appendChild(dv);leg.innerHTML+=`<span class="dc-mix-item"><span class="dc-mix-swatch" style="background:${MIX_COLORS[k]}"></span>${k} ${p.toFixed(0)}%</span>`;}
  if(d.dt){const t=new Date(d.dt);document.getElementById('dc-updated').textContent='UPDATED '+t.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})+(d.est?' (EST)':'');}
  document.getElementById('detail-card').style.display='block';
}
function hideDetailCard(){document.getElementById('detail-card').style.display='none';}

function updateLegend(){
  const bar=document.getElementById('legend-bar'),lab=document.getElementById('legend-labels');
  if(activeSignal==='carbon'){bar.style.background='linear-gradient(to right,#22c55e,#84cc16,#eab308,#f97316,#ef4444)';lab.innerHTML='<span>0</span><span>150</span><span>300</span><span>450</span><span>600+</span>';}
  else if(activeSignal==='renewable'){bar.style.background='linear-gradient(to right,#ef4444,#f97316,#eab308,#84cc16,#22c55e)';lab.innerHTML='<span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>';}
  else{bar.style.background='linear-gradient(to right,#22c55e,#84cc16,#eab308,#f97316,#ef4444)';lab.innerHTML='<span>0%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>';}
}

// ════════════════════════════════════════════════════════
// DATA FETCH — fixed renewable & fossil computation
// ════════════════════════════════════════════════════════
async function fetchZone(code){
  try{
    const[cR,pR]=await Promise.all([
      fetch('/api/electricity-maps/carbon-intensity/'+code),
      fetch('/api/electricity-maps/power-breakdown/'+code)
    ]);
    if(!cR.ok)return; // carbon intensity failed — skip zone entirely
    const cD=await cR.json();
    if(cD.carbonIntensity==null)return;

    // Power breakdown is optional — some zones may not have it
    let mix={},ren=null,fos=null;
    if(pR.ok){
      const pD=await pR.json();
      // Always log the first few zones so we can see API structure in console
      if(Object.keys(zoneData).length<3)console.log('[EM] pb '+code+':',JSON.stringify(pD));
      // Walk entire response to find a breakdown object (has solar or wind key)
      function findBreakdown(obj,depth){
        if(!obj||typeof obj!=='object'||depth>4)return null;
        if(Array.isArray(obj))return findBreakdown(obj[0],depth+1);
        if('solar'in obj||'wind'in obj||'gas'in obj||'coal'in obj||'nuclear'in obj||'hydro'in obj)return obj;
        for(const v of Object.values(obj)){const r=findBreakdown(v,depth+1);if(r)return r;}
        return null;
      }
      mix=findBreakdown(pD,0)||{};
      // Compute percentages from mix values (normalize negatives to 0)
      const vals=Object.values(mix).map(v=>Math.max(0,v||0));
      const tot=vals.reduce((a,v)=>a+v,0);
      if(tot>0){
        const g=k=>Math.max(0,mix[k]||0);
        const rGWh=g('solar')+g('wind')+g('hydro')+g('hydro discharge')+g('geothermal')+g('biomass');
        ren=Math.min(100,rGWh/tot*100);
        fos=Math.min(100,(g('gas')+g('coal')+g('oil'))/tot*100);
      }
      // Also check explicit percentage fields anywhere in response
      function findPct(obj,keys,depth){
        if(!obj||typeof obj!=='object'||depth>4)return null;
        if(Array.isArray(obj))return findPct(obj[0],keys,depth+1);
        for(const k of keys)if(k in obj&&obj[k]!=null)return obj[k];
        for(const v of Object.values(obj)){const r=findPct(v,keys,depth+1);if(r!=null)return r;}
        return null;
      }
      if(ren==null)ren=findPct(pD,['renewablePercentage','renewable_percentage','renewables'],0);
      if(fos==null)fos=findPct(pD,['fossilFuelPercentage','fossil_fuel_percentage','fossilPercentage','fossil','fossilPercent'],0);
      if(ren!=null)console.log('[EM]',code,'ren='+ren.toFixed(1)+'% fos='+(fos?.toFixed(1)??'null')+'%');
    }
    zoneData[code]={ci:cD.carbonIntensity,dt:cD.datetime,est:cD.isEstimated,ren,fos,mix};
  }catch(e){console.warn('fetch failed',code,e);}
}

async function fetchAll(){
  const codes=Object.keys(ZONES);
  const prevCount=Object.keys(zoneData).length;
  for(let i=0;i<codes.length;i++){
    await fetchZone(codes[i]);
    document.getElementById('sb-zones').textContent=(i+1)+' / '+codes.length+' zones';
    colorAllMeshes();updateList();if(isFlat)draw2d();
    if(i<codes.length-1)await new Promise(r=>setTimeout(r,200));
  }
  const liveCount=Object.keys(zoneData).length;
  const badge=document.querySelector('.live-badge');
  if(badge){
    if(liveCount===0){
      badge.innerHTML='<div class="live-dot" style="background:#f97316"></div> EST · STATIC DATA';
      badge.style.color='#f97316';
    } else {
      badge.innerHTML='<div class="live-dot"></div> LIVE &middot; UPDATING EVERY 15 MIN';
      badge.style.color='';
    }
  }
}
